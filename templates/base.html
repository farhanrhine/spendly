<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Finlo{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>

    <nav class="navbar">
        <div class="nav-inner">
            <a href="{{ url_for('landing') }}" class="nav-brand">
                <svg class="brand-icon" viewBox="0 0 32 32" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <!-- Wallet with Coins Above -->
                    <rect x="6" y="14" width="16" height="12" rx="2"/>
                    <circle cx="16" cy="8" r="2.5" fill="currentColor"/>
                    <circle cx="24" cy="10" r="2" fill="currentColor"/>
                </svg>
                <span class="brand-name">Finlo</span>
            </a>
            <div class="nav-links">
                <div class="settings-menu">
                    <button id="settings-btn" class="settings-btn" aria-label="Settings">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m2.98 2.98l4.24 4.24M1 12h6m6 0h6M4.22 19.78l4.24-4.24m2.98-2.98l4.24-4.24M19.78 19.78l-4.24-4.24m-2.98-2.98l-4.24-4.24"></path>
                        </svg>
                    </button>
                    <div id="settings-dropdown" class="settings-dropdown">
                        <a href="{{ url_for('settings') }}" class="settings-option">
                            <span class="theme-label">Settings</span>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="9 18 15 12 9 6"></polyline>
                            </svg>
                        </a>
                    </div>
                </div>
                {% if session.get('user_id') %}
                    <form method="POST" action="{{ url_for('logout') }}" style="display: inline;">
                        <button type="submit" class="nav-logout" style="background: none; border: none; color: inherit; cursor: pointer; text-decoration: none;">Sign out</button>
                    </form>
                {% else %}
                    <a href="{{ url_for('login') }}">Sign in</a>
                    <a href="{{ url_for('register') }}" class="nav-cta">Get started</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="footer-inner">
            <svg class="brand-icon" viewBox="0 0 32 32" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <!-- Wallet with Coins Above -->
                <rect x="6" y="14" width="16" height="12" rx="2"/>
                <circle cx="16" cy="8" r="2.5" fill="currentColor"/>
                <circle cx="24" cy="10" r="2" fill="currentColor"/>
            </svg>
            <span class="footer-name">Finlo</span>
            <p class="footer-copy">Track every rupee. Own your finances.</p>
            <a href="/terms">Terms and Conditions</a>
            <a href="/privacy">Privacy Policy</a>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
