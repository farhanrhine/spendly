{% extends "base.html" %}

{% block title %}Add Expense — Finlo{% endblock %}

{% block content %}

<section class="auth-section">
    <div class="auth-container">

        <div class="auth-header">
            <h1 class="auth-title">Add New Expense</h1>
            <p class="auth-subtitle">Record your transaction</p>
        </div>

        <div class="auth-card">
            {% if error %}
            <div class="auth-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ url_for('add_expense_post') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
                <div class="form-group">
                    <label for="amount">Amount (₹)</label>
                    <input type="number" id="amount" name="amount"
                           class="form-input" placeholder="Enter amount"
                           step="0.01" min="0" required
                           value="{{ amount or '' }}" autofocus>
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" class="form-input" required>
                        <option value="">Select a category</option>
                        {% for cat in categories %}
                        <option value="{{ cat }}" {% if category == cat %}selected{% endif %}>
                            {{ cat }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date"
                           class="form-input" required
                           value="{{ date or default_date }}">
                </div>

                <div class="form-group">
                    <label for="description">Description (Optional)</label>
                    <textarea id="description" name="description"
                              class="form-input" rows="3"
                              placeholder="Add notes about this expense">{{ description or '' }}</textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-submit">Add Expense</button>
                    <a href="{{ url_for('profile') }}" class="btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</section>

{% endblock %}
